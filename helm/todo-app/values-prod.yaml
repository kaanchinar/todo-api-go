# Production environment overrides

replicaCount: 3

image:
  tag: "sha-1d7df0cdf0e2e7e11fe2fd631f251a5b84f2b924"

httpRoute:
  enabled: true
  hostnames:
    - todo.local

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: false

# PostgreSQL - production settings
postgresql:
  username: postgres
  password: "prodpassword123"  # Set via --set or secrets
  database: todoapp
  persistence:
    enabled: true
    size: 5Gi
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# Redis - production settings
redis:
  password: ""  # Set via --set or secrets
  persistence:
    enabled: true
    size: 1Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 128Mi