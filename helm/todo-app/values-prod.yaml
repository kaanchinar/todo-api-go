# Production environment overrides

replicaCount: 3

image:
  tag: "sha-affa2277010c7e4130d6165975bc939d20a5a5e2-ndaskjfhsajkh"

httpRoute:
  enabled: true
  hostnames:
    - todo.local

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: false

# PostgreSQL - production settings
postgresql:
  username: postgres
  password: "prodpassword123"  # Set via --set or secrets
  database: todoapp
  persistence:
    enabled: true
    size: 5Gi
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# Redis - production settings
redis:
  password: ""  # Set via --set or secrets
  persistence:
    enabled: true
    size: 1Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 128Mi
