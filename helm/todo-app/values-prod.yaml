# Production environment overrides

replicaCount: 3

image:
  tag: "sha-8b08c9d1ba5f546812d6a09d0791a7002fc4278d"

httpRoute:
  enabled: true
  hostnames:
    - todo.local

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: false

# PostgreSQL - production settings
postgresql:
  username: postgres
  password: ""  # Set via --set or secrets
  database: todoapp
  persistence:
    enabled: true
    size: 5Gi
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# Redis - production settings
redis:
  password: ""  # Set via --set or secrets
  persistence:
    enabled: true
    size: 1Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 128Mi
