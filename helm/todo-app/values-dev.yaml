# Dev environment overrides

replicaCount: 1

image:
  tag: "latest"

httpRoute:
  enabled: true
  hostnames:
    - todo-dev.local

hpa:
  enabled: false

serviceMonitor:
  enabled: false

# PostgreSQL - dev settings (no persistence)
postgresql:
  username: postgres
  password: "" # Set via --set or secrets
  database: todoapp
  persistence:
    enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Redis - dev settings (no persistence)
redis:
  password: ""
  persistence:
    enabled: false
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi