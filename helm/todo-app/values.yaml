# Default values for todo-app

replicaCount: 1

image:
  repository: ghcr.io/kaanchinar/todo-api-go-not-valid
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Gateway API HTTPRoute
httpRoute:
  enabled: false
  gateway:
    name: gateway
    namespace: default
  hostnames:
    - todo-dev.local

# Horizontal Pod Autoscaler
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Resource limits
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 15s
  path: /metrics
  port: http

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

nodeSelector: {}
tolerations: []
affinity: {}

# PostgreSQL
postgresql:
  username: postgres
  password: postgres
  database: todoapp
  persistence:
    enabled: false
    size: 1Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Redis
redis:
  password: ""
  persistence:
    enabled: false
    size: 1Gi
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi
