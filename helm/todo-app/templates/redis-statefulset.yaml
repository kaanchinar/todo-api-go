apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "todo-app.fullname" . }}-redis
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "todo-app.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "todo-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "todo-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          {{- if .Values.redis.password }}
          args:
            - redis-server
            - --requirepass
            - {{ .Values.redis.password }}
          {{- end }}
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- end }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                {{- if .Values.redis.password }}
                - -a
                - {{ .Values.redis.password }}
                {{- end }}
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                {{- if .Values.redis.password }}
                - -a
                - {{ .Values.redis.password }}
                {{- end }}
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: {{ .Values.redis.resources.limits.cpu | default "200m" }}
              memory: {{ .Values.redis.resources.limits.memory | default "256Mi" }}
            requests:
              cpu: {{ .Values.redis.resources.requests.cpu | default "100m" }}
              memory: {{ .Values.redis.resources.requests.memory | default "64Mi" }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- end }}