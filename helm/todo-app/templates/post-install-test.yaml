apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "todo-app.fullname" . }}-post-install-test"
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: post-install-test
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "todo-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: post-install-test
    spec:
      restartPolicy: Never
      containers:
        - name: health-check
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Running post-install health check..."
              curl -sf http://{{ include "todo-app.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/health || exit 1
              echo "Health check passed!"
