apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: todo-app-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: todo-app
      rules:
        - alert: HighErrorRate
          expr: |
            (
              sum(rate(http_errors_total[2m]))
              /
              sum(rate(http_requests_total[2m]))
            ) * 100 > 5
          for: 2m
          labels:
            severity: warning
            namespace: monitoring
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value }}% for the last 2 minutes"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
            ) > 0.5
          for: 5m
          labels:
            severity: warning
            namespace: monitoring
          annotations:
            summary: "High P99 latency detected"
            description: "P99 latency is {{ $value }}s for the last 5 minutes"

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[5m]) > 0
          for: 5m
          labels:
            severity: critical
            namespace: monitoring
          annotations:
            summary: "Pod is crash looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restart rate {{ $value }}/sec"
