apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: "local-l2-policy"
  namespace: kube-system
spec:
  serviceSelector:
    matchLabels:
      "io.cilium.gateway/managed-by": "cilium"
  nodeSelector:
    matchExpressions:
      - key: "kubernetes.io/os"
        operator: In
        values:
          - linux
