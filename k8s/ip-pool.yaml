apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: lb-pool
  namespace: kube-system
spec:
  externalIPs: true
  loadBalancerIPs: true
  interfaces:
    - eth1
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: default-pool
  namespace: kube-system
spec:
  blocks:
    - start: "192.168.56.200"
      stop: "192.168.56.215"
